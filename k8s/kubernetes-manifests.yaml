apiVersion: v1
kind: Namespace
metadata:
  name: rainbowforest-ecommerce
---
# ========================================================
# 1. DATABASE & MIDDLEWARE INFRASTRUCTURE
# ========================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysql
  namespace: rainbowforest-ecommerce
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mysql
  template:
    metadata:
      labels:
        app: mysql
    spec:
      containers:
      - name: mysql
        image: mysql:8.0
        env:
        - name: MYSQL_ROOT_PASSWORD
          value: "root"
        ports:
        - containerPort: 3306
---
apiVersion: v1
kind: Service
metadata:
  name: mysql
  namespace: rainbowforest-ecommerce
spec:
  ports:
  - port: 3306
  selector:
    app: mysql
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: rainbowforest-ecommerce
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
      - name: redis
        image: redis:alpine
        ports:
        - containerPort: 6379
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: rainbowforest-ecommerce
spec:
  ports:
  - port: 6379
  selector:
    app: redis
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rabbitmq
  namespace: rainbowforest-ecommerce
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rabbitmq
  template:
    metadata:
      labels:
        app: rabbitmq
    spec:
      containers:
      - name: rabbitmq
        image: rabbitmq:3-management-alpine
        ports:
        - containerPort: 5672
        - containerPort: 15672
---
apiVersion: v1
kind: Service
metadata:
  name: rabbitmq
  namespace: rainbowforest-ecommerce
spec:
  ports:
  - name: amqp
    port: 5672
  - name: management
    port: 15672
  selector:
    app: rabbitmq
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongodb
  namespace: rainbowforest-ecommerce
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mongodb
  template:
    metadata:
      labels:
        app: mongodb
    spec:
      containers:
      - name: mongodb
        image: mongo:latest
        ports:
        - containerPort: 27017
---
apiVersion: v1
kind: Service
metadata:
  name: mongodb
  namespace: rainbowforest-ecommerce
spec:
  ports:
  - port: 27017
  selector:
    app: mongodb
---
# ========================================================
# 2. SPRING CLOUD INFRASTRUCTURE
# ========================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: eureka-server
  namespace: rainbowforest-ecommerce
spec:
  replicas: 1
  selector:
    matchLabels:
      app: eureka-server
  template:
    metadata:
      labels:
        app: eureka-server
    spec:
      containers:
      - name: eureka-server
        image: rainbowforest/eureka-server:latest
        ports:
        - containerPort: 8761
---
apiVersion: v1
kind: Service
metadata:
  name: eureka-server
  namespace: rainbowforest-ecommerce
spec:
  ports:
  - port: 8761
  selector:
    app: eureka-server
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: rainbowforest-ecommerce
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
      - name: api-gateway
        image: rainbowforest/api-gateway:latest
        env:
        - name: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
          value: "http://eureka-server:8761/eureka"
        - name: SPRING_REDIS_HOST
          value: "redis"
        ports:
        - containerPort: 8900
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: rainbowforest-ecommerce
spec:
  type: LoadBalancer
  ports:
  - port: 8900
    targetPort: 8900
  selector:
    app: api-gateway
---
# ========================================================
# 3. BACKEND MICROSERVICES
# ========================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
  namespace: rainbowforest-ecommerce
spec:
  replicas: 2
  selector:
    matchLabels:
      app: user-service
  template:
    metadata:
      labels:
        app: user-service
    spec:
      containers:
      - name: user-service
        image: rainbowforest/user-service:latest
        env:
        - name: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
          value: "http://eureka-server:8761/eureka"
        - name: SPRING_DATASOURCE_URL
          value: "jdbc:mysql://mysql:3306/users?createDatabaseIfNotExist=true"
        - name: SPRING_DATASOURCE_PASSWORD
          value: "root"
        ports:
        - containerPort: 8811
---
apiVersion: v1
kind: Service
metadata:
  name: user-service
  namespace: rainbowforest-ecommerce
spec:
  ports:
  - port: 8811
  selector:
    app: user-service
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: rainbowforest-ecommerce
spec:
  replicas: 2
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
      - name: auth-service
        image: rainbowforest/auth-service:latest
        env:
        - name: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
          value: "http://eureka-server:8761/eureka"
        - name: SPRING_REDIS_HOST
          value: "redis"
        - name: USER_SERVICE_URL
          value: "http://user-service:8811/"
        ports:
        - containerPort: 8815
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: rainbowforest-ecommerce
spec:
  ports:
  - port: 8815
  selector:
    app: auth-service
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: product-catalog-service
  namespace: rainbowforest-ecommerce
spec:
  replicas: 2
  selector:
    matchLabels:
      app: product-catalog-service
  template:
    metadata:
      labels:
        app: product-catalog-service
    spec:
      containers:
      - name: product-catalog-service
        image: rainbowforest/product-catalog-service:latest
        env:
        - name: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
          value: "http://eureka-server:8761/eureka"
        - name: SPRING_DATASOURCE_URL
          value: "jdbc:mysql://mysql:3306/product_catalog?createDatabaseIfNotExist=true"
        - name: SPRING_DATASOURCE_PASSWORD
          value: "root"
        - name: SPRING_RABBITMQ_HOST
          value: "rabbitmq"
        ports:
        - containerPort: 8810
---
apiVersion: v1
kind: Service
metadata:
  name: product-catalog-service
  namespace: rainbowforest-ecommerce
spec:
  ports:
  - port: 8810
  selector:
    app: product-catalog-service
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service
  namespace: rainbowforest-ecommerce
spec:
  replicas: 2
  selector:
    matchLabels:
      app: order-service
  template:
    metadata:
      labels:
        app: order-service
    spec:
      containers:
      - name: order-service
        image: rainbowforest/order-service:latest
        env:
        - name: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
          value: "http://eureka-server:8761/eureka"
        - name: SPRING_DATASOURCE_URL
          value: "jdbc:mysql://mysql:3306/orders?createDatabaseIfNotExist=true"
        - name: SPRING_DATASOURCE_PASSWORD
          value: "root"
        - name: SPRING_REDIS_HOST
          value: "redis"
        - name: SPRING_RABBITMQ_HOST
          value: "rabbitmq"
        - name: SPRING_DATA_MONGODB_URI
          value: "mongodb://mongodb:27017/logs"
        - name: USER_SERVICE_URL
          value: "http://user-service:8811/"
        - name: PRODUCT_CATALOG_SERVICE_URL
          value: "http://product-catalog-service:8810/"
        ports:
        - containerPort: 8813
---
apiVersion: v1
kind: Service
metadata:
  name: order-service
  namespace: rainbowforest-ecommerce
spec:
  ports:
  - port: 8813
  selector:
    app: order-service
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: product-recommendation-service
  namespace: rainbowforest-ecommerce
spec:
  replicas: 1
  selector:
    matchLabels:
      app: product-recommendation-service
  template:
    metadata:
      labels:
        app: product-recommendation-service
    spec:
      containers:
      - name: product-recommendation-service
        image: rainbowforest/product-recommendation-service:latest
        env:
        - name: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
          value: "http://eureka-server:8761/eureka"
        - name: SPRING_DATASOURCE_URL
          value: "jdbc:mysql://mysql:3306/product_recommendations?createDatabaseIfNotExist=true"
        - name: SPRING_DATASOURCE_PASSWORD
          value: "root"
        - name: USER_SERVICE_URL
          value: "http://user-service:8811/"
        - name: PRODUCT_CATALOG_SERVICE_URL
          value: "http://product-catalog-service:8810/"
        ports:
        - containerPort: 8812
---
apiVersion: v1
kind: Service
metadata:
  name: product-recommendation-service
  namespace: rainbowforest-ecommerce
spec:
  ports:
  - port: 8812
  selector:
    app: product-recommendation-service
---
# ========================================================
# 4. FRONTEND CLIENT
# ========================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: client
  namespace: rainbowforest-ecommerce
spec:
  replicas: 2
  selector:
    matchLabels:
      app: client
  template:
    metadata:
      labels:
        app: client
    spec:
      containers:
      - name: client
        image: rainbowforest/client:latest
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: client
  namespace: rainbowforest-ecommerce
spec:
  type: LoadBalancer
  ports:
  - port: 80
    targetPort: 80
  selector:
    app: client
